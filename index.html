<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Involve Bridge</title></head>
<body>
<script>
  window.addEventListener("message", async function(e) {
    if (!e.data || e.data.type !== "CREATE_DRAFT") return;
    const { msgId, to, subject, body, htmlBody, scriptUrl } = e.data;
    try {
      const response = await fetch(scriptUrl, {
        method: "POST",
        // text/plain evita preflight CORS hacia Apps Script
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ to, subject, body, htmlBody })
      });
      const data = await response.json();
      e.source.postMessage({
        msgId,
        success: data.success === true,
        error: data.error || null
      }, "*");
    } catch(err) {
      e.source.postMessage({ msgId, success: false, error: err.message }, "*");
    }
  });
  window.parent.postMessage({ type: "BRIDGE_READY" }, "*");
</script>
</body>
</html>
